services:
  init:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gestione-assenze-app:latest
    restart: "no"
    env_file:
      - .env.docker
    command: php artisan migrate --force --seed
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app-storage:/var/www/html/storage

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: gestione-assenze-app:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      CACHE_LARAVEL: "true"
    ports:
      - "8080:80"
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - app-storage:/var/www/html/storage

  queue:
    image: gestione-assenze-app:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    command: php artisan queue:work --sleep=3 --tries=3 --timeout=120
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - app-storage:/var/www/html/storage

  scheduler:
    image: gestione-assenze-app:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - .env.docker
    command: php artisan schedule:work
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - app-storage:/var/www/html/storage

  db:
    image: mariadb:11.4
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "127.0.0.1:3307:3306"
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h localhost -u\"$${MARIADB_USER}\" -p\"$${MARIADB_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  app-storage:
  db-data:
